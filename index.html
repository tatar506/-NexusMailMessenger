<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMail Messenger</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0e1621; --card: #17212b; --blue: #5288c1; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; background: #242f3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--blue); color: white; cursor: pointer; font-weight: bold; }
        #chat-container { display: none; width: 100%; max-width: 800px; height: 90vh; background: var(--card); flex-direction: column; border-radius: 10px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #182533; padding: 10px; border-radius: 8px; max-width: 80%; width: fit-content; }
        .msg.mine { align-self: flex-end; background: #2b5278; }
        .input-box { display: flex; padding: 15px; background: var(--bg); }
        #online-tag { color: var(--blue); font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Экран логина -->
    <div id="auth-box" class="card">
        <h2>NexusMail</h2>
        <input type="email" id="email" placeholder="Gmail адрес">
        <button onclick="sendOTP()" id="btn-otp">Получить код</button>
        <div id="otp-area" style="display:none">
            <input type="text" id="otp-code" placeholder="6-значный код">
            <button onclick="verifyOTP()">Войти</button>
        </div>
    </div>

    <!-- Экран чата -->
    <div id="chat-container">
        <div style="padding: 15px; border-bottom: 1px solid #0e1621;">
            <strong>NexusMail Chat</strong>
            <div id="online-tag">Онлайн: <span id="count">0</span></div>
            <div id="typing" style="height: 14px; font-size: 12px; color: #aaa;"></div>
        </div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="m-input" placeholder="Сообщение..." oninput="emitTyping()">
            <button onclick="sendMsg()" style="width: 80px; margin-left: 10px;">➜</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://nexusmailmessenger.onrender.com"; // ЗАМЕНИ НА СВОЙ URL ОТ RENDER
        let socket, currentUser;

        async function sendOTP() {
            const email = document.getElementById('email').value;
            const res = await fetch(`${SERVER_URL}/api/auth/send-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            if (res.ok) {
                document.getElementById('otp-area').style.display = 'block';
                document.getElementById('btn-otp').style.display = 'none';
            } else alert("Ошибка!");
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('otp-code').value;
            const res = await fetch(`${SERVER_URL}/api/auth/verify-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, code })
            });
            const data = await res.json();
            if (data.token) {
                currentUser = data.email;
                localStorage.setItem('email', data.email);
                startChat();
            } else alert("Неверный код");
        }

        function startChat() {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            socket = io(SERVER_URL);
            socket.emit('join', currentUser);

            socket.on('online_count', c => document.getElementById('count').innerText = c);
            
            socket.on('chat_history', msgs => msgs.forEach(addMsg));
            
            socket.on('chat_message', addMsg);
            
            socket.on('user_typing', email => {
                const t = document.getElementById('typing');
                t.innerText = email.split('@')[0] + ' печатает...';
                setTimeout(() => t.innerText = '', 2000);
            });
        }

        function addMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === currentUser ? 'mine' : ''}`;
            div.innerHTML = `<small style="color: #5288c1">${msg.sender.split('@')[0]}</small><br>${msg.text}`;
            document.getElementById('messages').appendChild(div);
            const box = document.getElementById('messages');
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const text = document.getElementById('m-input').value;
            if(!text) return;
            socket.emit('chat_message', { sender: currentUser, text });
            document.getElementById('m-input').value = '';
        }

        function emitTyping() {
            socket.emit('typing', currentUser);
        }

        // Авто-логин
        if(localStorage.getItem('email')) {
            currentUser = localStorage.getItem('email');
            startChat();
        }
    </script>
</body>
</html>
